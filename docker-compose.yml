name: tcgplayer-automation-dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development-dependencies-env
    command: node scripts/docker-dev-start.mjs
    container_name: tcgplayer-automation-dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tcgplayer_automation
      DB_STARTUP_RETRIES: 30
      DB_STARTUP_DELAY_MS: 2000
      NODE_ENV: development
      PORT: 5173
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: tcgplayer-postgres-dev
    environment:
      POSTGRES_DB: tcgplayer_automation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tcgplayer_automation"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data

volumes:
  postgres-data-dev:
